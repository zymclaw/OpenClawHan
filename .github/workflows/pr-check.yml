# ============================================================
# OpenClaw 汉化发行版 - PR 检查工作流
# ZYM | https://github.com/zymclaw/OpenClawHan
# ============================================================
#
# 触发方式：
#   - PR 提交到 main 分支时
#   - 手动触发（用于调试）
#
# 检查内容：
#   - JSON 格式验证
#   - 翻译规则验证
#   - 面板数据验证
#   - Python 脚本语法检查
# ============================================================

name: PR 检查

on:
  pull_request:
    branches: [main]
    paths:
      - 'translations/**'
      - 'cli/**'
      - 'scripts/**'
      - '*.sh'
      - '*.ps1'
  workflow_dispatch:

jobs:
  # ==================== 翻译规则验证 ====================
  validate-translations:
    name: 验证翻译规则
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 验证 JSON 格式
        run: |
          echo "🔍 检查所有翻译 JSON 文件格式..."
          ERROR_COUNT=0
          
          for file in $(find translations -name "*.json"); do
            if ! jq empty "$file" 2>/dev/null; then
              echo "❌ JSON 格式错误: $file"
              ERROR_COUNT=$((ERROR_COUNT + 1))
            fi
          done
          
          if [ $ERROR_COUNT -gt 0 ]; then
            echo "❌ 发现 $ERROR_COUNT 个 JSON 格式错误"
            exit 1
          fi
          
          echo "✅ 所有 JSON 文件格式正确"

      - name: 验证翻译配置
        run: |
          echo "🔍 检查翻译配置文件..."
          
          # 检查 config.json 存在且格式正确
          if [ ! -f "translations/config.json" ]; then
            echo "❌ 缺少 translations/config.json"
            exit 1
          fi
          
          # 验证配置结构
          jq -e '.modules' translations/config.json > /dev/null || {
            echo "❌ config.json 缺少 modules 字段"
            exit 1
          }
          
          echo "✅ 翻译配置验证通过"

      - name: 检查翻译规则状态
        run: |
          echo "🔍 检查翻译规则状态..."
          node cli/index.mjs status || true
          echo "✅ 翻译规则状态检查完成"

      - name: 验证面板数据
        run: |
          echo "🔍 检查面板数据..."
          
          PANEL_DATA="translations/panel/panel-data.json"
          
          if [ ! -f "$PANEL_DATA" ]; then
            echo "⚠️ 面板数据文件不存在，跳过检查"
            exit 0
          fi
          
          # 验证 JSON 格式
          jq empty "$PANEL_DATA" || {
            echo "❌ panel-data.json 格式错误"
            exit 1
          }
          
          # 验证必需字段
          jq -e '.faq' "$PANEL_DATA" > /dev/null || {
            echo "❌ panel-data.json 缺少 faq 字段"
            exit 1
          }
          
          jq -e '.plugins' "$PANEL_DATA" > /dev/null || {
            echo "❌ panel-data.json 缺少 plugins 字段"
            exit 1
          }
          
          jq -e '.about' "$PANEL_DATA" > /dev/null || {
            echo "❌ panel-data.json 缺少 about 字段"
            exit 1
          }
          
          echo "✅ 面板数据验证通过"

  # ==================== Python 脚本检查 ====================
  validate-scripts:
    name: 验证 Python 脚本
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install pyflakes

      - name: 检查 Python 语法
        run: |
          echo "🔍 检查 Python 脚本语法..."
          ERROR_COUNT=0
          
          for file in scripts/*.py; do
            if [ -f "$file" ]; then
              echo "检查: $file"
              if ! python3 -m py_compile "$file"; then
                echo "❌ 语法错误: $file"
                ERROR_COUNT=$((ERROR_COUNT + 1))
              fi
            fi
          done
          
          if [ $ERROR_COUNT -gt 0 ]; then
            echo "❌ 发现 $ERROR_COUNT 个 Python 语法错误"
            exit 1
          fi
          
          echo "✅ 所有 Python 脚本语法正确"

      - name: 运行 pyflakes 检查
        run: |
          echo "🔍 运行 pyflakes 静态检查..."
          pyflakes scripts/*.py || true
          echo "✅ pyflakes 检查完成"

  # ==================== Shell 脚本检查 ====================
  validate-shell:
    name: 验证 Shell 脚本
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: 检查 Bash 脚本语法
        run: |
          echo "🔍 检查 Bash 脚本语法..."
          
          for file in *.sh; do
            if [ -f "$file" ]; then
              echo "检查: $file"
              bash -n "$file" || {
                echo "❌ 语法错误: $file"
                exit 1
              }
            fi
          done
          
          echo "✅ 所有 Bash 脚本语法正确"

      - name: 运行 ShellCheck
        run: |
          echo "🔍 运行 ShellCheck..."
          shellcheck *.sh || true
          echo "✅ ShellCheck 检查完成"

  # ==================== 检查摘要 ====================
  summary:
    name: 检查摘要
    needs: [validate-translations, validate-scripts, validate-shell]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 生成摘要
        run: |
          echo "## 🔍 PR 检查结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 检查项 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.validate-translations.result }}" == "success" ]; then
            echo "| 翻译规则验证 | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 翻译规则验证 | ❌ 失败 |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.validate-scripts.result }}" == "success" ]; then
            echo "| Python 脚本检查 | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Python 脚本检查 | ❌ 失败 |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.validate-shell.result }}" == "success" ]; then
            echo "| Shell 脚本检查 | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Shell 脚本检查 | ❌ 失败 |" >> $GITHUB_STEP_SUMMARY
          fi
