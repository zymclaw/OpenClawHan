# ============================================================
# OpenClaw 汉化发行版 - 核心构建逻辑（可复用工作流）
# ZYM | https://github.com/zymclaw/OpenClawHan
# ============================================================
#
# 此工作流被 nightly.yml 和 sync-and-release.yml 调用
# 包含：克隆上游 → 应用汉化 → 构建 → 修复图标 → 注入面板
# ============================================================

name: 核心构建逻辑

on:
  workflow_call:
    inputs:
      version_type:
        description: '版本类型: nightly 或 stable'
        required: true
        type: string
      version:
        description: '版本号'
        required: true
        type: string
      upstream_version:
        description: '上游版本号'
        required: true
        type: string
      upstream_sha:
        description: '上游 commit SHA（可选，用于记录）'
        required: false
        type: string
        default: ''
    outputs:
      applied:
        description: '应用的翻译规则数'
        value: ${{ jobs.build.outputs.applied }}
      existed:
        description: '已存在的规则数'
        value: ${{ jobs.build.outputs.existed }}
      failed:
        description: '未匹配的规则数'
        value: ${{ jobs.build.outputs.failed }}
      files:
        description: '替换操作次数'
        value: ${{ jobs.build.outputs.files }}
      build_date:
        description: '构建日期'
        value: ${{ jobs.build.outputs.build_date }}
      build_time:
        description: '构建时间'
        value: ${{ jobs.build.outputs.build_time }}

env:
  UPSTREAM_REPO: openclaw/openclaw
  NODE_VERSION: '22'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      applied: ${{ steps.apply.outputs.applied }}
      existed: ${{ steps.apply.outputs.existed }}
      failed: ${{ steps.apply.outputs.failed }}
      files: ${{ steps.apply.outputs.files }}
      build_date: ${{ steps.prepare.outputs.build_date }}
      build_time: ${{ steps.prepare.outputs.build_time }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 获取 pnpm store 目录
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 配置 pnpm 缓存
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 克隆上游代码
        run: |
          if [ "${{ inputs.version_type }}" = "stable" ]; then
            # 稳定版：克隆指定 tag，避免 main 分支版本号超前导致版本倒挂
            # npm 版本可能带 -N 后缀（如 2026.2.21-2），但 git tag 通常不带（v2026.2.21）
            UPSTREAM_VER="${{ inputs.upstream_version }}"
            BASE_VER="${UPSTREAM_VER%%-*}"
            if git clone --depth 1 --branch "v${UPSTREAM_VER}" https://github.com/${{ env.UPSTREAM_REPO }}.git openclaw 2>/dev/null; then
              echo "📌 使用精确 tag v${UPSTREAM_VER}"
            elif [ "$BASE_VER" != "$UPSTREAM_VER" ] && git clone --depth 1 --branch "v${BASE_VER}" https://github.com/${{ env.UPSTREAM_REPO }}.git openclaw 2>/dev/null; then
              echo "📌 使用基础 tag v${BASE_VER}（npm 版本 ${UPSTREAM_VER} 无对应 tag）"
            else
              echo "⚠️ 未找到 tag v${UPSTREAM_VER} 或 v${BASE_VER}，回退到 main 分支"
              git clone --depth 1 https://github.com/${{ env.UPSTREAM_REPO }}.git openclaw
            fi
          else
            # Nightly：追踪 main 分支最新代码
            git clone --depth 1 https://github.com/${{ env.UPSTREAM_REPO }}.git openclaw
          fi
          cd openclaw
          COMMIT_SHA=$(git rev-parse --short HEAD)
          echo "✅ 上游代码已克隆 (commit: $COMMIT_SHA)"

      - name: 应用汉化补丁
        id: apply
        run: |
          # 运行汉化并捕获输出
          OUTPUT=$(node cli/index.mjs apply --verbose 2>&1) || true
          echo "$OUTPUT"
          
          # 从机器可读的统计行提取数据（格式: ##STATS##applied=N|existed=N|failed=N##）
          STATS_LINE=$(echo "$OUTPUT" | grep -o '##STATS##[^#]*##' | head -1)
          
          if [ -n "$STATS_LINE" ]; then
            APPLIED=$(echo "$STATS_LINE" | grep -o 'applied=[0-9]*' | cut -d= -f2)
            EXISTED=$(echo "$STATS_LINE" | grep -o 'existed=[0-9]*' | cut -d= -f2)
            FAILED=$(echo "$STATS_LINE" | grep -o 'failed=[0-9]*' | cut -d= -f2)
          fi
          
          # 统计替换操作次数（剥离 ANSI 后计数）
          CLEAN=$(echo "$OUTPUT" | sed $'s/\x1b\\[[0-9;]*m//g')
          FILES_COUNT=$(echo "$CLEAN" | grep -c "^  替换:" || echo "0")
          
          # 确保所有值都是纯数字，防止写入 GITHUB_OUTPUT 时出错
          [[ ! "$APPLIED" =~ ^[0-9]+$ ]] && APPLIED="0"
          [[ ! "$EXISTED" =~ ^[0-9]+$ ]] && EXISTED="0"
          [[ ! "$FAILED" =~ ^[0-9]+$ ]] && FAILED="0"
          [[ ! "$FILES_COUNT" =~ ^[0-9]+$ ]] && FILES_COUNT="0"
          
          echo "applied=$APPLIED" >> $GITHUB_OUTPUT
          echo "existed=$EXISTED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "files=$FILES_COUNT" >> $GITHUB_OUTPUT
          
          echo ""
          echo "📊 汉化统计："
          echo "   ✅ 应用规则: $APPLIED 条"
          echo "   ⏭️ 已存在: $EXISTED 条"
          echo "   ⚠️ 未匹配: $FAILED 条"
          echo "   📝 替换操作: $FILES_COUNT 次"

      - name: 验证汉化结果
        run: |
          node cli/index.mjs verify || true
          echo "✅ 汉化验证完成"

      - name: 修复上游类型错误
        working-directory: openclaw
        run: |
          # 修复 discord/monitor/agent-components.ts 类型错误
          # Error: Type '"channel" | "dm"' is not assignable to type 'ChatType'
          if [ -f src/discord/monitor/agent-components.ts ]; then
            echo "🔧 尝试修复 discord agent-components.ts..."
            sed -i 's/kind: isDirectMessage ? "dm" : "channel"/kind: isDirectMessage ? "direct" : "channel"/g' src/discord/monitor/agent-components.ts
            # 如果已经是 direct，上面的 sed 不会生效，但下面这个通用的可能会误伤，所以仅针对特定模式
            # 另外检查是否还有 "dm" 作为类型被使用
            grep -n "kind: isDirectMessage" src/discord/monitor/agent-components.ts || true
          fi

      - name: 构建 OpenClaw
        working-directory: openclaw
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build
          echo "✅ 核心构建完成"
          
      - name: 构建 Dashboard UI
        working-directory: openclaw
        run: |
          pnpm ui:build
          echo "✅ Dashboard UI 构建完成"
          ls -la dist/control-ui/ || echo "❌ control-ui 目录不存在"
          ls -la dist/control-ui/assets/ || echo "❌ assets 目录不存在"

      - name: 注入功能面板
        run: |
          echo "📁 当前目录: $(pwd)"
          echo "📁 目录结构:"
          ls -la
          echo ""
          echo "📁 openclaw/dist/ 内容:"
          ls -la openclaw/dist/ || echo "❌ openclaw/dist/ 不存在"
          echo ""
          echo "📁 openclaw/dist/control-ui/ 内容:"
          ls -la openclaw/dist/control-ui/ || echo "❌ control-ui 不存在"
          echo ""
          echo "📁 openclaw/dist/control-ui/assets/ 内容:"
          ls -la openclaw/dist/control-ui/assets/ || echo "❌ assets 不存在"
          echo ""
          echo "🔍 搜索所有包含 index.html 的目录:"
          find openclaw/dist -name "index.html" -type f 2>/dev/null | head -10
          echo ""
          echo "🔍 搜索所有 assets 目录 (排除 node_modules):"
          find openclaw/dist -name "assets" -type d ! -path "*/node_modules/*" 2>/dev/null | head -10
          echo ""
          echo "📁 canvas-host/a2ui 目录内容 (如果存在):"
          ls -la openclaw/dist/canvas-host/a2ui/ 2>/dev/null || echo "❌ 目录不存在"
          echo ""
          echo "🔍 搜索所有 .js 文件 (排除 node_modules):"
          find openclaw/dist -name "*.js" ! -path "*/node_modules/*" -type f 2>/dev/null | grep -E "(index|main|app)" | head -10
          echo ""
          echo "🦞 开始注入功能面板..."
          python3 scripts/inject_panel.py
          echo ""
          echo "📊 注入后检查:"
          # 支持新旧两种目录结构
          JS_FILE=""
          if [ -f openclaw/dist/canvas-host/a2ui/a2ui.bundle.js ]; then
            JS_FILE="openclaw/dist/canvas-host/a2ui/a2ui.bundle.js"
          elif ls openclaw/dist/control-ui/assets/index-*.js 1>/dev/null 2>&1; then
            JS_FILE=$(ls openclaw/dist/control-ui/assets/index-*.js | head -1)
          fi
          
          if [ -n "$JS_FILE" ]; then
            echo "JS 文件: $JS_FILE"
            echo "文件大小: $(ls -la "$JS_FILE" | awk '{print $5}') bytes"
            PANEL_COUNT=$(grep -c 'initPanel' "$JS_FILE" || echo 0)
            echo "是否包含面板代码: $PANEL_COUNT 处"
            if [ "$PANEL_COUNT" -eq "0" ]; then
              echo "❌ 错误: 面板代码未注入成功！"
            else
              echo "✅ 面板代码注入成功"
            fi
          else
            echo "❌ 未找到主 JS 文件"
          fi
          echo "✅ 功能面板注入步骤完成"

      - name: 准备版本信息
        id: prepare
        run: |
          VERSION="${{ inputs.version }}"
          VERSION_TYPE="${{ inputs.version_type }}"
          
          echo "build_date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "build_time=$(date +%H:%M)" >> $GITHUB_OUTPUT
          echo "📦 版本: $VERSION ($VERSION_TYPE)"
          
          # 更新 package.json
          cd openclaw
          npm version $VERSION --no-git-tag-version --allow-same-version || true
          
          # 修改包信息
          if [ "$VERSION_TYPE" = "nightly" ]; then
            jq '.description = "OpenClaw 汉化发行版 (Nightly) - ZYM"' package.json > tmp.json && mv tmp.json package.json
          else
            jq '.description = "OpenClaw 汉化发行版（稳定版）- ZYM"' package.json > tmp.json && mv tmp.json package.json
          fi
          
          jq '.name = "openclaw-zh-clean"' package.json > tmp.json && mv tmp.json package.json
          
          # 使用中文 README
          cp ../README.md ./README.md

      - name: 准备 Docker 构建
        run: |
          # 复制 Dockerfile 和 .dockerignore 到构建目录
          cp Dockerfile openclaw/Dockerfile
          cp .dockerignore openclaw/.dockerignore 2>/dev/null || true
          
          # 验证构建产物存在
          echo "📦 检查构建产物..."
          ls -la openclaw/
          ls -la openclaw/dist/ || echo "⚠️ dist/ 目录不存在"
          ls -la openclaw/node_modules/ | head -20 || echo "⚠️ node_modules/ 目录不存在"
          
          # 确保 dist 目录存在
          if [ ! -d "openclaw/dist" ]; then
            echo "❌ 错误：dist/ 目录不存在，Docker 构建将失败"
            exit 1
          fi
          
          echo "✅ Docker 构建准备完成"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-build-${{ inputs.version_type }}
          path: openclaw/
          retention-days: 1
