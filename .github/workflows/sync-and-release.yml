# ============================================================
# OpenClaw 汉化发行版 - 稳定版发布工作流
# ZYM | https://github.com/zymclaw/OpenClawHan
# ============================================================
# 
# 触发方式：
#   1. 推送 tag（格式：v*，如 v2026.1.30-zh.1）
#   2. 手动触发（用于紧急发布）
#
# 版本说明：
#   - 稳定版 (@latest)：本工作流发布，手动打 tag 触发
#   - 最新版 (@nightly)：nightly.yml 发布，每小时自动构建
#
# 优化：
#   - 调用 build-core.yml 复用工作流，减少代码重复
# ============================================================

name: 稳定版发布

on:
  push:
    tags:
      - 'v*'  # 监听所有 v 开头的 tag
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号（如 2026.1.30-zh.1，不含 v 前缀）'
        required: true
        type: string

env:
  UPSTREAM_REPO: openclaw/openclaw
  NODE_VERSION: '22'

permissions:
  contents: write
  packages: write

jobs:
  # ==================== 准备版本信息 ====================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      upstream_version: ${{ steps.upstream.outputs.version }}
    
    steps:
      - name: 确定版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            # 从 tag 提取版本号（去掉 v 前缀）
            TAG_NAME="${{ github.ref_name }}"
            VERSION="${TAG_NAME#v}"
          else
            # 手动触发时使用输入的版本号
            VERSION="${{ inputs.version }}"
          fi
          
          echo "release_version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 发布版本: $VERSION"

      - name: 获取上游版本
        id: upstream
        run: |
          UPSTREAM_VERSION=$(curl -s https://registry.npmjs.org/openclaw/latest | jq -r '.version')
          echo "version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
          echo "📦 上游版本: $UPSTREAM_VERSION"

  # ==================== 调用核心构建 ====================
  build:
    needs: prepare
    uses: ./.github/workflows/build-core.yml
    with:
      version_type: stable
      version: ${{ needs.prepare.outputs.release_version }}
      upstream_version: ${{ needs.prepare.outputs.upstream_version }}
    secrets: inherit

  # ==================== 发布到 npm 和 Docker ====================
  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: openclaw-build-stable
          path: openclaw

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装依赖
        working-directory: openclaw
        run: pnpm install --frozen-lockfile

      - name: 发布到 npm (@latest)
        working-directory: openclaw
        # 使用 --ignore-scripts 跳过 prepack 脚本，因为代码已在 build job 中构建完成
        # 否则 prepack 会触发重新构建，覆盖掉注入的功能面板
        run: npm publish --access public --tag latest --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 同步 npmmirror 镜像源
        run: |
          echo "🔄 触发 npmmirror 同步..."
          # 主动触发 npmmirror 同步，解决国内镜像源版本滞后问题
          # 参考: https://github.com/zymclaw/OpenClawHan/issues/32
          curl -sX PUT "https://registry-direct.npmmirror.com/-/package/openclaw-zh-clean/syncs" || true
          echo "⏳ 等待 30 秒让同步生效..."
          sleep 30
          # 验证同步结果
          MIRROR_VER=$(curl -s "https://registry.npmmirror.com/openclaw-zh-clean/latest" | jq -r '.version // "unknown"')
          echo "📦 npmmirror 当前版本: $MIRROR_VER"
          echo "📦 本次发布版本: ${{ needs.prepare.outputs.release_version }}"
          if [ "$MIRROR_VER" = "${{ needs.prepare.outputs.release_version }}" ]; then
            echo "✅ npmmirror 同步成功！"
          else
            echo "⚠️ npmmirror 尚未同步到最新版本，可能需要几分钟"
          fi
        continue-on-error: true

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.prepare.outputs.release_version }}
          name: "🦞 OpenClaw 汉化版 v${{ needs.prepare.outputs.release_version }}"
          body: |
            ## 🦞 OpenClaw 汉化发行版 - 稳定版
            
            **版本**: v${{ needs.prepare.outputs.release_version }}
            **上游版本**: ${{ needs.prepare.outputs.upstream_version }}
            **发布类型**: 稳定版 (Stable)
            
            ---
            
            ### 📊 汉化统计
            
            | 指标 | 数量 | 说明 |
            |------|------|------|
            | ✅ 应用规则 | **${{ needs.build.outputs.applied }}** 条 | 成功应用的翻译规则 |
            | ⏭️ 已存在 | ${{ needs.build.outputs.existed }} 条 | 翻译已存在，跳过 |
            | ⚠️ 未匹配 | ${{ needs.build.outputs.failed }} 条 | 源码变更导致未匹配 |
            | 📝 替换操作 | ${{ needs.build.outputs.files }} 次 | 实际执行的替换次数 |
            
            ---
            
            ### 📦 安装方式
            
            **稳定版（推荐）：**
            ```bash
            npm install -g openclaw-zh-clean@latest
            ```
            
            **最新版（每小时更新）：**
            ```bash
            npm install -g openclaw-zh-clean@nightly
            ```
            
            **一键安装脚本：**
            ```bash
            # Linux/macOS
            curl -fsSL https://cdn.jsdelivr.net/gh/zymclaw/OpenClawHan@main/install.sh | bash
            
            # Windows PowerShell
            powershell -c "irm https://cdn.jsdelivr.net/gh/zymclaw/OpenClawHan@main/install.ps1 | iex"
            ```
            
            ---
            
            ### 🔗 相关链接
            
            - 🔥 官网: https://github.com/zymclaw/OpenClawHan
            - 📖 文档: https://github.com/zymclaw/OpenClawHan
            - 📦 npm: https://www.npmjs.com/package/openclaw-zh-clean
            - 🌙 最新版: https://github.com/zymclaw/OpenClawHan/releases/tag/nightly
            
            ---
            
            **ZYM** | https://github.com/zymclaw/OpenClawHan
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==================== Docker 镜像构建与推送 ====================
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 准备 Docker 元数据
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/openclaw-zh
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prepare.outputs.release_version }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: ./openclaw
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          # 使用 Registry Cache - 比 GHA 缓存更稳定，无 10GB 限制
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/openclaw-zh:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/openclaw-zh:buildcache,mode=max
          platforms: linux/amd64,linux/arm64

      - name: 设置镜像为公开
        run: |
          # 使用 GitHub API 将包设置为公开
          curl -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/packages/container/openclaw-zh/versions \
            -d '{"visibility":"public"}' || true
          echo "✅ Docker 镜像已推送到 ghcr.io"

      # ==================== Docker Hub 镜像（国内加速） ====================
      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: 推送到 Docker Hub（国内加速）
        uses: docker/build-push-action@v5
        with:
          context: ./openclaw
          push: true
          tags: |
            ${{ github.repository_owner }}/openclaw-zh:latest
            ${{ github.repository_owner }}/openclaw-zh:${{ needs.prepare.outputs.release_version }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/openclaw-zh:buildcache
          platforms: linux/amd64,linux/arm64
        continue-on-error: true

      # 同步 Docker Hub 仓库描述
      - name: 更新 Docker Hub 描述
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ github.repository_owner }}/openclaw-zh
          readme-filepath: ./DOCKER_README.md
        continue-on-error: true

      - name: 构建摘要
        run: |
          echo "## 🦞 稳定版发布完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 版本号 | v${{ needs.prepare.outputs.release_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 上游版本 | ${{ needs.prepare.outputs.upstream_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 应用规则 | ${{ needs.build.outputs.applied }} 条 |" >> $GITHUB_STEP_SUMMARY
          echo "| 未匹配规则 | ${{ needs.build.outputs.failed }} 条 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 安装方式" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**npm**: \`npm install -g openclaw-zh-clean@latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker (ghcr.io)**: \`docker pull ghcr.io/zymclaw/openclaw-zh-clean:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Hub (国内加速)**: \`docker pull zymclaw/openclaw-zh-clean:latest\`" >> $GITHUB_STEP_SUMMARY
