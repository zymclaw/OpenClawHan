# ============================================================
# OpenClaw 汉化发行版 - 最新版（Nightly）自动构建工作流
# ZYM | https://github.com/zymclaw/OpenClawHan
# ============================================================
#
# 触发方式：
#   - 每小时42分自动运行
#   - 手动触发
#
# 版本说明：
#   - 最新版 (@nightly)：本工作流发布，每小时自动构建，追踪上游最新代码
#   - 稳定版 (@latest)：sync-and-release.yml 发布，手动打 tag 触发
#
# 优化：
#   - 上游无变更时跳过构建，节省 Actions 配额
#   - 调用 build-core.yml 复用工作流，减少代码重复
#
# 用户安装：
#   npm install -g openclaw-zh-clean@nightly
# ============================================================

name: 最新版构建 (Nightly)

on:
  schedule:
    # 每小时42分构建（错峰避免冲突）
    - cron: '42 * * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建（跳过版本检查）'
        required: false
        default: 'false'
        type: boolean

env:
  UPSTREAM_REPO: openclaw/openclaw
  NODE_VERSION: '22'

permissions:
  contents: write
  packages: write

jobs:
  # ==================== 上游变更检测 ====================
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      upstream_version: ${{ steps.check.outputs.version }}
      upstream_sha: ${{ steps.check.outputs.sha }}
      nightly_version: ${{ steps.check.outputs.nightly_version }}
    
    steps:
      - name: 检测上游变更
        id: check
        run: |
          # 获取上游 npm 版本
          UPSTREAM_VERSION=$(curl -s https://registry.npmjs.org/openclaw/latest | jq -r '.version')
          echo "📦 上游版本: $UPSTREAM_VERSION"
          
          # 获取上游最新 commit
          UPSTREAM_SHA=$(curl -s https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/commits/main | jq -r '.sha' | cut -c1-7)
          echo "📝 上游 SHA: $UPSTREAM_SHA"
          
          # 获取上次构建记录的 SHA（从 nightly release body 中提取）
          LAST_SHA=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/tags/nightly | jq -r '.body // ""' | grep -oP '<!-- upstream_sha:\K[a-f0-9]+' || echo "")
          echo "📝 上次 SHA: ${LAST_SHA:-无记录}"
          
          # 判断是否有变化
          if [ "$UPSTREAM_SHA" != "$LAST_SHA" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ 检测到上游变更，将执行构建"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "⏭️ 上游无变更，跳过构建"
          fi
          
          # 生成 nightly 版本号
          TIMESTAMP=$(date +%Y%m%d%H%M)
          NIGHTLY_VERSION="${UPSTREAM_VERSION}-nightly.${TIMESTAMP}"
          
          echo "version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
          echo "sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "nightly_version=$NIGHTLY_VERSION" >> $GITHUB_OUTPUT
          echo "📦 Nightly 版本: $NIGHTLY_VERSION"

  # ==================== 调用核心构建 ====================
  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.has_changes == 'true' || github.event.inputs.force_build == 'true'
    uses: ./.github/workflows/build-core.yml
    with:
      version_type: nightly
      version: ${{ needs.check-upstream.outputs.nightly_version }}
      upstream_version: ${{ needs.check-upstream.outputs.upstream_version }}
      upstream_sha: ${{ needs.check-upstream.outputs.upstream_sha }}
    secrets: inherit

  # ==================== 发布到 npm 和 Docker ====================
  publish:
    needs: [check-upstream, build]
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: openclaw-build-nightly
          path: openclaw

      - name: 验证功能面板注入
        run: |
          echo "📊 验证 artifact 中的功能面板注入..."
          # 支持新旧两种目录结构
          JS_FILE=""
          if [ -f openclaw/dist/canvas-host/a2ui/a2ui.bundle.js ]; then
            JS_FILE="openclaw/dist/canvas-host/a2ui/a2ui.bundle.js"
            echo "📁 检测到新版目录结构: canvas-host/a2ui"
          elif ls openclaw/dist/control-ui/assets/index-*.js 1>/dev/null 2>&1; then
            JS_FILE=$(ls openclaw/dist/control-ui/assets/index-*.js | head -1)
            echo "📁 检测到旧版目录结构: control-ui/assets"
          fi
          
          if [ -n "$JS_FILE" ]; then
            echo "JS 文件: $JS_FILE"
            echo "文件大小: $(ls -la "$JS_FILE" | awk '{print $5}') bytes"
            PANEL_COUNT=$(grep -c 'initPanel' "$JS_FILE" || echo 0)
            echo "面板代码出现次数: $PANEL_COUNT"
            if [ "$PANEL_COUNT" -eq "0" ]; then
              echo "⚠️ 警告: artifact 中未检测到功能面板代码！"
            else
              echo "✅ 功能面板代码已确认存在"
            fi
          else
            echo "❌ 未找到 JS 文件"
            echo "📁 查找 dist 目录结构..."
            find openclaw/dist -name "*.js" ! -path "*/node_modules/*" -type f 2>/dev/null | head -10
          fi

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: 发布到 npm (nightly 标签)
        working-directory: openclaw
        # 使用 --ignore-scripts 跳过 prepack 脚本，因为代码已在 build job 中构建完成
        run: npm publish --access public --tag nightly --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: 同步 npmmirror 镜像源
        run: |
          echo "🔄 触发 npmmirror 同步..."
          # 主动触发 npmmirror 同步，解决国内镜像源版本滞后问题
          # 参考: https://github.com/zymclaw/OpenClawHan/issues/32
          curl -sX PUT "https://registry-direct.npmmirror.com/-/package/openclaw-zh-clean/syncs" || true
          echo "✅ 已触发 npmmirror 同步"
        continue-on-error: true

      - name: 删除旧的 nightly 标签
        run: |
          git push origin :refs/tags/nightly || true
          echo "🗑️ 已删除旧的 nightly 标签"

      - name: 创建新的 nightly 标签
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa nightly -m "Nightly build ${{ needs.build.outputs.build_date }} ${{ needs.build.outputs.build_time }}"
          git push origin nightly --force
          echo "🏷️ 已创建 nightly 标签"

      - name: 创建/更新 Nightly Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: "🌙 Nightly Build - ${{ needs.build.outputs.build_date }} ${{ needs.build.outputs.build_time }}"
          prerelease: true
          body: |
            <!-- upstream_sha:${{ needs.check-upstream.outputs.upstream_sha }} -->
            
            ## 🌙 OpenClaw 汉化版 - 最新版 (Nightly)
            
            > ⚠️ **警告**：此为每小时自动构建版本，追踪上游最新代码，可能包含未完全测试的更改。
            > 
            > 🔒 **需要稳定版？** 请安装 `@latest`：`npm install -g openclaw-zh-clean@latest`
            
            **构建时间**: ${{ needs.build.outputs.build_date }} ${{ needs.build.outputs.build_time }} (UTC)
            **上游版本**: ${{ needs.check-upstream.outputs.upstream_version }}
            **上游 SHA**: ${{ needs.check-upstream.outputs.upstream_sha }}
            **Nightly 版本**: ${{ needs.check-upstream.outputs.nightly_version }}
            **发布类型**: 最新版 (Nightly) - 每小时自动构建
            
            ---
            
            ### 📊 汉化统计
            
            | 指标 | 数量 | 状态 |
            |------|------|------|
            | ✅ 应用规则 | **${{ needs.build.outputs.applied }}** 条 | 成功 |
            | ⏭️ 已存在 | ${{ needs.build.outputs.existed }} 条 | 跳过 |
            | ⚠️ 未匹配 | ${{ needs.build.outputs.failed }} 条 | 需关注 |
            | 📝 替换操作 | ${{ needs.build.outputs.files }} 次 | - |
            
            ---
            
            ### 📦 安装 Nightly 版本
            
            ```bash
            # 安装 nightly 版本
            npm install -g openclaw-zh-clean@nightly
            
            # 切换回稳定版
            npm install -g openclaw-zh-clean@latest
            ```
            
            ---
            
            ### 🔗 相关链接
            
            - 🔥 官网: https://github.com/zymclaw/OpenClawHan
            - 📖 稳定版: https://github.com/zymclaw/OpenClawHan/releases/latest
            - 📦 npm: https://www.npmjs.com/package/openclaw-zh-clean
            
            ---
            
            **ZYM** | https://github.com/zymclaw/OpenClawHan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==================== Docker 镜像构建与推送 ====================
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 准备 Docker 元数据
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/openclaw-zh
          tags: |
            type=raw,value=nightly
            type=raw,value=${{ needs.check-upstream.outputs.nightly_version }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: ./openclaw
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          # 使用 Registry Cache - 比 GHA 缓存更稳定，无 10GB 限制
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/openclaw-zh:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/openclaw-zh:buildcache,mode=max
          platforms: linux/amd64,linux/arm64
        continue-on-error: true

      - name: 设置 Docker 镜像为公开
        run: |
          echo "🔓 设置 Docker 镜像可见性为 public..."
          curl -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/packages/container/openclaw-zh/versions \
            -d '{"visibility":"public"}' || true
        continue-on-error: true

      # ==================== Docker Hub 镜像（国内加速） ====================
      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: 推送到 Docker Hub（国内加速）
        uses: docker/build-push-action@v5
        with:
          context: ./openclaw
          push: true
          tags: |
            ${{ github.repository_owner }}/openclaw-zh:nightly
            ${{ github.repository_owner }}/openclaw-zh:${{ needs.check-upstream.outputs.nightly_version }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/openclaw-zh:buildcache
          platforms: linux/amd64,linux/arm64
        continue-on-error: true

      # 同步 Docker Hub 仓库描述
      - name: 更新 Docker Hub 描述
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ github.repository_owner }}/openclaw-zh
          readme-filepath: ./DOCKER_README.md
        continue-on-error: true

      - name: 构建摘要
        run: |
          echo "## 🌙 Nightly 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 构建时间 | ${{ needs.build.outputs.build_date }} ${{ needs.build.outputs.build_time }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 上游版本 | ${{ needs.check-upstream.outputs.upstream_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 上游 SHA | ${{ needs.check-upstream.outputs.upstream_sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Nightly 版本 | ${{ needs.check-upstream.outputs.nightly_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 应用规则 | ${{ needs.build.outputs.applied }} 条 |" >> $GITHUB_STEP_SUMMARY
          echo "| 未匹配规则 | ${{ needs.build.outputs.failed }} 条 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 安装方式" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**npm**: \`npm install -g openclaw-zh-clean@nightly\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker (ghcr.io)**: \`docker pull ghcr.io/zymclaw/openclaw-zh-clean:nightly\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Hub (国内加速)**: \`docker pull zymclaw/openclaw-zh-clean:nightly\`" >> $GITHUB_STEP_SUMMARY

  # ==================== 无变更时的摘要 ====================
  skip-summary:
    needs: check-upstream
    if: needs.check-upstream.outputs.has_changes == 'false' && github.event.inputs.force_build != 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: 无变更摘要
        run: |
          echo "## ⏭️ Nightly 构建已跳过" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "上游代码无变更，跳过本次构建。" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 上游版本 | ${{ needs.check-upstream.outputs.upstream_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 上游 SHA | ${{ needs.check-upstream.outputs.upstream_sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "如需强制构建，请使用「Run workflow」并勾选「强制构建」选项。" >> $GITHUB_STEP_SUMMARY
